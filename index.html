<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ryosukehys - Home</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #24292f;
      background: #f6f8fa;
      line-height: 1.6;
    }
    header {
      background: #24292f;
      color: #fff;
      padding: 3rem 1rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 600; }
    header p { margin-top: 0.5rem; color: #8b949e; font-size: 1rem; }
    main {
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #d0d7de;
    }
    .projects {
      display: grid;
      gap: 0.75rem;
    }
    .project-card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }
    .project-card:hover { border-color: #0969da; }
    .project-card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #0969da;
    }
    .project-card p {
      font-size: 0.875rem;
      color: #656d76;
      margin-top: 0.25rem;
    }
    .fork-info {
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 0.35rem;
    }
    .fork-link {
      color: #0969da;
    }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: #ddf4ff;
      color: #0969da;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: #8b949e;
      font-size: 0.8rem;
    }
    footer a { color: #0969da; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>ryosukehys</h1>
    <p>Projects &amp; Apps</p>
  </header>

  <main>
    <h2>Apps</h2>
    <div class="projects">
      <a class="project-card" href="https://ryosukehys.github.io/sakenojin2026/">
        <h3>sakenojin2026 <span class="badge">GitHub Pages</span></h3>
        <p>にいがた酒の陣 2026</p>
        <p class="fork-info">Forked from <span class="fork-link">tsurezure-lab/niigata-sake-no-jin-26</span></p>
      </a>
    </div>
  </main>

  <footer>
    <a href="https://github.com/ryosukehys">github.com/ryosukehys</a>
  </footer>
</body>
</html>
